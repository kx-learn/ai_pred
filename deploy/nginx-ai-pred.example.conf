# 复制到 server { } 里使用。部署前先确认：dist 已构建且 base 为 /ai-pred/（与本项目 vite.config.ts 一致）。
#
# ── 推荐：用 root（try_files 最省心）────────────────────────────
# 服务器目录必须是：  $root/ai-pred/index.html  存在
# 即：把本机 dist 里的全部文件，放到服务器目录  .../ai-pred/  下（不要多套一层 dist）
# 例：/var/www/html/ai-pred/index.html  或  /home/project2/ai-pred/index.html
#
# 下面示例 root 为 /home/project2，则上传目标为：/home/project2/ai-pred/

location = /ai-pred {
    return 301 /ai-pred/;
}

location /ai-pred/ {
    root /home/project2;
    index index.html;
    try_files $uri $uri/ /ai-pred/index.html;
}

# ── 若坚持用 alias=/home/project2/dist/，务必加 ^~，避免被 .js/.css 正则 location 抢走
# location ^~ /ai-pred/ {
#     alias /home/project2/dist/;
#     index index.html;
#     try_files $uri $uri/ /ai-pred/index.html;
# }
#
# 若 alias 方案仍 404，请改用上面的 root 方案，并把文件放到 /home/project2/ai-pred/
